<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIM 阅读器</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
      #app { display: flex; width: 100%; height: 100%; overflow: hidden; }

      /* ── 左侧栏 ── */
      #sidebar {
        width: 300px; flex-shrink: 0; background: #1e1e1e; color: #eee;
        display: flex; flex-direction: column; border-right: 1px solid #333;
      }
      #sidebar header { padding: 14px 16px; border-bottom: 1px solid #333; }
      #sidebar h1 { margin: 0 0 4px; font-size: 17px; font-weight: 600; }
      #sidebar p { margin: 0; font-size: 11px; color: #aaa; }
      #controls { padding: 12px 16px; border-bottom: 1px solid #333; }

      /* 按钮 */
      .btn { display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: 9px 12px; border: none; border-radius: 6px; background: #0d84fc; color: #fff; font-size: 13px; cursor: pointer; transition: background 0.2s; }
      .btn:hover { background: #0a6fd6; }
      .btn:disabled { background: #555; cursor: not-allowed; }
      .btn-secondary { background: #444; margin-top: 6px; }
      .btn-secondary:hover { background: #555; }
      .btn-success { background: #2d8a4e; }
      .btn-success:hover { background: #24753f; }
      .btn-small { padding: 6px 10px; font-size: 12px; width: auto; }
      .btn-danger { background: #c0392b; }
      .btn-danger:hover { background: #a93226; }
      .hidden-input { position: fixed; top: -9999px; left: -9999px; }

      /* 标签页 */
      #sidebar-tabs { display: flex; border-bottom: 1px solid #333; }
      .tab-btn { flex: 1; padding: 8px 4px; border: none; background: transparent; color: #888; font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; }
      .tab-btn:hover { color: #ccc; }
      .tab-btn.active { color: #0d84fc; border-bottom-color: #0d84fc; }
      .tab-panel { display: none; flex: 1; overflow-y: auto; }
      .tab-panel.active { display: flex; flex-direction: column; }

      /* 模型列表 */
      #model-list { padding: 8px 12px; }
      .model-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; margin-bottom: 5px; background: #2a2a2a; border-radius: 6px; font-size: 13px; }
      .model-item .model-checkbox { margin-right: 8px; accent-color: #0d84fc; cursor: pointer; }
      .model-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 8px; }
      .model-item .count-badge { font-size: 11px; background: #444; color: #aaa; padding: 2px 6px; border-radius: 10px; margin-right: 8px; }
      .model-item .actions { display: flex; gap: 6px; }
      .icon-btn { width: 22px; height: 22px; border: none; border-radius: 4px; background: #444; color: #fff; cursor: pointer; font-size: 12px; line-height: 1; }
      .icon-btn:hover { background: #666; }

      /* CBM 层级树 */
      #cbm-tree-panel { padding: 8px 0; }
      .tree-node { user-select: none; }
      .tree-row { display: flex; align-items: center; padding: 4px 8px; cursor: pointer; font-size: 13px; transition: background 0.15s; }
      .tree-row:hover { background: #2a2a2a; }
      .tree-row.selected { background: #0d84fc33; }
      .tree-toggle { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #888; flex-shrink: 0; transition: transform 0.15s; }
      .tree-toggle.expanded { transform: rotate(90deg); }
      .tree-toggle.leaf { visibility: hidden; }
      .tree-icon { margin-right: 6px; font-size: 14px; flex-shrink: 0; }
      .tree-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .tree-children { display: none; padding-left: 16px; }
      .tree-children.expanded { display: block; }

      /* ── 中间视口 ── */
      #center { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; position: relative; background: #eee; }
      #viewport { flex: 1 1 auto; min-width: 0; overflow: hidden; position: relative; }
      #loading { position: absolute; top: 16px; right: 16px; padding: 10px 14px; background: rgba(0,0,0,0.7); color: #fff; border-radius: 6px; font-size: 13px; display: none; z-index: 10; }
      #empty-tip { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #aaa; pointer-events: none; }
      #empty-tip h2 { margin: 0 0 8px; font-weight: 400; }
      #empty-tip p { margin: 0; font-size: 14px; }

      /* ── 右侧属性面板 ── */
      #props-drawer {
        flex: 0 0 320px; width: 320px; min-width: 0; flex-shrink: 0;
        background: #1e1e1e; color: #eee;
        display: flex; flex-direction: column; border-left: 1px solid #333;
        transition: flex-basis 0.25s ease, width 0.25s ease;
        overflow: hidden;
      }
      #props-drawer.collapsed { flex-basis: 0; width: 0; border-left: none; }
      #props-drawer-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 12px 14px; border-bottom: 1px solid #333; flex-shrink: 0;
      }
      #props-drawer-header h3 { margin: 0; font-size: 13px; font-weight: 600; color: #ccc; }
      #props-drawer-body { flex: 1; overflow-y: auto; padding: 12px 14px; }
      .props-empty { color: #666; font-size: 13px; text-align: center; padding: 32px 0; }
      .props-header { margin: 0 0 10px; font-size: 14px; font-weight: 600; color: #0d84fc; padding-bottom: 8px; border-bottom: 1px solid #333; }
      .props-section { margin-bottom: 12px; }
      .props-section-title { font-size: 12px; color: #888; font-weight: 600; margin: 0 0 6px; text-transform: uppercase; letter-spacing: 0.5px; }
      .props-table { width: 100%; border-collapse: collapse; font-size: 12px; }
      .props-table tr { border-bottom: 1px solid #2a2a2a; }
      .props-table td { padding: 5px 6px; vertical-align: top; }
      .props-table .prop-key { color: #888; width: 40%; white-space: nowrap; }
      .props-table .prop-val { color: #ddd; word-break: break-all; }

      /* 属性面板切换按钮（浮动在视口右侧） */
      #btn-toggle-props {
        position: fixed; top: 12px; right: 332px; z-index: 9999;
        width: 32px; height: 32px; border-radius: 6px; border: none;
        background: rgba(30,30,30,0.85); color: #ccc; font-size: 16px;
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        transition: background 0.2s, right 0.25s ease;
      }
      #btn-toggle-props:hover { background: rgba(60,60,60,0.95); }

      /* ── 模态框 ── */
      .modal-overlay {
        display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55);
        z-index: 1000; align-items: center; justify-content: center;
      }
      .modal-overlay.open { display: flex; }
      .modal {
        background: #1e1e1e; color: #eee; border-radius: 12px;
        width: 520px; max-width: 90vw; max-height: 80vh;
        display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      }
      .modal-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 20px; border-bottom: 1px solid #333;
      }
      .modal-header h3 { margin: 0; font-size: 15px; font-weight: 600; }
      .modal-close { width: 28px; height: 28px; border: none; border-radius: 6px; background: #444; color: #fff; cursor: pointer; font-size: 16px; line-height: 1; }
      .modal-close:hover { background: #666; }
      .modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
      .modal-footer { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-top: 1px solid #333; gap: 8px; }
      .modal-footer .btn { width: auto; min-width: 80px; }
      .modal-list { display: flex; flex-direction: column; gap: 4px; }
      .modal-check-item { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; padding: 6px 8px; border-radius: 6px; transition: background 0.15s; }
      .modal-check-item:hover { background: #2a2a2a; }
      .modal-check-item input[type="checkbox"] { margin: 0; accent-color: #0d84fc; }
      .modal-info { font-size: 12px; color: #888; margin-bottom: 12px; }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- 左侧栏 -->
      <aside id="sidebar">
        <header>
          <h1>GIM 阅读器</h1>
          <p>基于 That Open + web-ifc + libarchive.js</p>
        </header>
        <div id="controls">
          <button id="btn-load-gim" class="btn">打开 GIM 文件</button>
          <input id="gim-file-input" class="hidden-input" type="file" accept=".gim" />
          <button id="btn-load-local" class="btn btn-secondary">打开 IFC 文件</button>
          <input id="file-input" class="hidden-input" type="file" accept=".ifc" multiple />
          <button id="btn-clear" class="btn btn-secondary">清空场景</button>
          <button id="btn-cache-manager" class="btn btn-secondary">缓存管理</button>
        </div>
        <div id="sidebar-tabs">
          <button class="tab-btn active" data-tab="tab-models">模型</button>
          <button class="tab-btn" data-tab="tab-tree">层级树</button>
          <button class="tab-btn" data-tab="tab-filedev">文件设备</button>
        </div>
        <div id="tab-models" class="tab-panel active">
          <div id="model-list"></div>
        </div>
        <div id="tab-tree" class="tab-panel">
          <div id="cbm-tree-panel"></div>
        </div>
        <div id="tab-filedev" class="tab-panel">
          <div id="file-dev-panel"></div>
        </div>
      </aside>

      <!-- 中间视口 -->
      <div id="center">
        <div id="viewport">
          <div id="loading">准备中...</div>
          <div id="empty-tip">
            <h2>尚未加载 IFC 模型</h2>
            <p>请打开 GIM 文件或选择本地 IFC 文件</p>
          </div>
        </div>
        <button id="btn-toggle-props" title="属性面板">☰</button>
      </div>

      <!-- 右侧属性面板 -->
      <div id="props-drawer">
        <div id="props-drawer-header">
          <h3>属性</h3>
          <button id="btn-close-props" class="icon-btn" title="收起">✕</button>
        </div>
        <div id="props-drawer-body">
          <div class="props-empty">选择层级树节点查看属性</div>
        </div>
      </div>
    </div>

    <!-- IFC 选择模态框 -->
    <div id="ifc-modal" class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h3>选择要加载的 IFC 文件</h3>
          <button id="modal-close" class="modal-close">✕</button>
        </div>
        <div class="modal-body">
          <div class="modal-info" id="modal-info"></div>
          <div class="modal-list" id="modal-ifc-list"></div>
        </div>
        <div class="modal-footer">
          <div style="display:flex;gap:6px">
            <button id="modal-select-all" class="btn btn-small btn-secondary">全选</button>
            <button id="modal-deselect-all" class="btn btn-small btn-secondary">取消全选</button>
          </div>
          <button id="modal-load" class="btn btn-small btn-success">加载选中</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
