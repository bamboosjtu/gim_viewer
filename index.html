<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIM 阅读器</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      #app {
        display: flex;
        width: 100%;
        height: 100%;
      }
      #sidebar {
        width: 340px;
        flex-shrink: 0;
        background: #1e1e1e;
        color: #eee;
        display: flex;
        flex-direction: column;
        border-right: 1px solid #333;
      }
      #sidebar header {
        padding: 16px;
        border-bottom: 1px solid #333;
      }
      #sidebar h1 {
        margin: 0 0 8px;
        font-size: 18px;
        font-weight: 600;
      }
      #sidebar p {
        margin: 0;
        font-size: 12px;
        color: #aaa;
      }
      #controls {
        padding: 16px;
        border-bottom: 1px solid #333;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-radius: 6px;
        background: #0d84fc;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn:hover {
        background: #0a6fd6;
      }
      .btn:disabled {
        background: #555;
        cursor: not-allowed;
      }
      .btn-secondary {
        background: #444;
        margin-top: 8px;
      }
      .btn-secondary:hover {
        background: #555;
      }
      .btn-success {
        background: #2d8a4e;
        margin-top: 8px;
      }
      .btn-success:hover {
        background: #24753f;
      }
      .btn-small {
        padding: 6px 10px;
        font-size: 12px;
        width: auto;
      }
      .hidden-input {
        display: none;
      }
      /* IFC 选择器 */
      #ifc-picker {
        display: none;
        padding: 12px 16px;
        border-bottom: 1px solid #333;
        max-height: 260px;
        overflow-y: auto;
      }
      #ifc-picker h3 {
        margin: 0 0 8px;
        font-size: 13px;
        color: #ccc;
        font-weight: 600;
      }
      .ifc-picker-actions {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
      }
      #ifc-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .ifc-check-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        cursor: pointer;
        padding: 4px 6px;
        border-radius: 4px;
        transition: background 0.15s;
      }
      .ifc-check-item:hover {
        background: #333;
      }
      .ifc-check-item input[type="checkbox"] {
        margin: 0;
        accent-color: #0d84fc;
      }
      /* 侧栏标签页 */
      #sidebar-tabs {
        display: flex;
        border-bottom: 1px solid #333;
      }
      .tab-btn {
        flex: 1;
        padding: 8px 4px;
        border: none;
        background: transparent;
        color: #888;
        font-size: 12px;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: color 0.2s, border-color 0.2s;
      }
      .tab-btn:hover {
        color: #ccc;
      }
      .tab-btn.active {
        color: #0d84fc;
        border-bottom-color: #0d84fc;
      }
      .tab-panel {
        display: none;
        flex: 1;
        overflow-y: auto;
      }
      .tab-panel.active {
        display: flex;
        flex-direction: column;
      }
      /* 模型列表 */
      #model-list {
        padding: 8px 12px;
      }
      .model-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px;
        margin-bottom: 6px;
        background: #2a2a2a;
        border-radius: 6px;
        font-size: 13px;
      }
      .model-item .model-checkbox {
        margin-right: 8px;
        accent-color: #0d84fc;
        cursor: pointer;
      }
      .model-item .name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        margin-right: 8px;
      }
      .model-item .count-badge {
        font-size: 11px;
        background: #444;
        color: #aaa;
        padding: 2px 6px;
        border-radius: 10px;
        margin-right: 8px;
      }
      .model-item .actions {
        display: flex;
        gap: 6px;
      }
      .icon-btn {
        width: 24px;
        height: 24px;
        border: none;
        border-radius: 4px;
        background: #444;
        color: #fff;
        cursor: pointer;
        font-size: 12px;
        line-height: 1;
      }
      .icon-btn:hover {
        background: #666;
      }
      /* 统计面板 */
      #stats-panel {
        padding: 12px 16px;
      }
      .stats-section {
        margin-bottom: 12px;
      }
      .stats-section h4 {
        margin: 0 0 6px;
        font-size: 12px;
        color: #888;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .stat-card {
        background: #2a2a2a;
        border-radius: 6px;
        padding: 8px 10px;
      }
      .stat-card .stat-value {
        font-size: 18px;
        font-weight: 700;
        color: #0d84fc;
      }
      .stat-card .stat-label {
        font-size: 11px;
        color: #888;
        margin-top: 2px;
      }
      .stats-list {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .stats-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 4px 8px;
        font-size: 12px;
        border-radius: 4px;
      }
      .stats-row:hover {
        background: #2a2a2a;
      }
      .stats-row .stats-row-name {
        color: #ccc;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
        margin-right: 8px;
      }
      .stats-row .stats-row-count {
        color: #0d84fc;
        font-weight: 600;
        flex-shrink: 0;
      }
      /* CBM 层级树 */
      #cbm-tree-panel {
        padding: 8px 0;
      }
      .tree-node {
        user-select: none;
      }
      .tree-row {
        display: flex;
        align-items: center;
        padding: 4px 8px;
        cursor: pointer;
        font-size: 13px;
        transition: background 0.15s;
      }
      .tree-row:hover {
        background: #2a2a2a;
      }
      .tree-row.selected {
        background: #0d84fc33;
      }
      .tree-toggle {
        width: 16px;
        height: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        color: #888;
        flex-shrink: 0;
        transition: transform 0.15s;
      }
      .tree-toggle.expanded {
        transform: rotate(90deg);
      }
      .tree-toggle.leaf {
        visibility: hidden;
      }
      .tree-icon {
        margin-right: 6px;
        font-size: 14px;
        flex-shrink: 0;
      }
      .tree-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .tree-children {
        display: none;
        padding-left: 16px;
      }
      .tree-children.expanded {
        display: block;
      }
      /* 属性面板 */
      #props-panel {
        padding: 12px 16px;
      }
      .props-empty {
        color: #666;
        font-size: 13px;
        text-align: center;
        padding: 24px 0;
      }
      .props-header {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 600;
        color: #0d84fc;
        padding-bottom: 8px;
        border-bottom: 1px solid #333;
      }
      .props-section {
        margin-bottom: 12px;
      }
      .props-section-title {
        font-size: 12px;
        color: #888;
        font-weight: 600;
        margin: 0 0 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .props-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      .props-table tr {
        border-bottom: 1px solid #2a2a2a;
      }
      .props-table td {
        padding: 5px 6px;
        vertical-align: top;
      }
      .props-table .prop-key {
        color: #888;
        width: 40%;
        white-space: nowrap;
      }
      .props-table .prop-val {
        color: #ddd;
        word-break: break-all;
      }
      /* 视口 */
      #viewport {
        flex: 1;
        position: relative;
        background: #eee;
      }
      #loading {
        position: absolute;
        top: 16px;
        right: 16px;
        padding: 10px 14px;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        border-radius: 6px;
        font-size: 13px;
        display: none;
        z-index: 10;
      }
      #empty-tip {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #aaa;
        pointer-events: none;
      }
      #empty-tip h2 {
        margin: 0 0 8px;
        font-weight: 400;
      }
      #empty-tip p {
        margin: 0;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <header>
          <h1>GIM 阅读器</h1>
          <p>基于 That Open + web-ifc + libarchive.js</p>
        </header>
        <div id="controls">
          <button id="btn-load-gim" class="btn">打开 GIM 文件</button>
          <input id="gim-file-input" class="hidden-input" type="file" accept=".gim" />
          <button id="btn-load-local" class="btn btn-secondary">选择本地 IFC 文件</button>
          <input id="file-input" class="hidden-input" type="file" accept=".ifc" multiple />
          <button id="btn-load-demo" class="btn btn-secondary">加载 Demo 示例</button>
          <button id="btn-clear" class="btn btn-secondary">清空场景</button>
        </div>
        <div id="ifc-picker">
          <h3>GIM 中的 IFC 文件</h3>
          <div class="ifc-picker-actions">
            <button id="btn-select-all" class="btn btn-small btn-secondary">全选</button>
            <button id="btn-deselect-all" class="btn btn-small btn-secondary">取消全选</button>
            <button id="btn-load-selected" class="btn btn-small btn-success">加载选中</button>
          </div>
          <div id="ifc-list"></div>
        </div>
        <div id="sidebar-tabs">
          <button class="tab-btn active" data-tab="tab-models">模型</button>
          <button class="tab-btn" data-tab="tab-tree">层级树</button>
          <button class="tab-btn" data-tab="tab-props">属性</button>
        </div>
        <div id="tab-models" class="tab-panel active">
          <div id="model-list"></div>
        </div>
        <div id="tab-tree" class="tab-panel">
          <div id="cbm-tree-panel"></div>
        </div>
        <div id="tab-props" class="tab-panel">
          <div id="props-panel">
            <div class="props-empty">选择层级树节点查看属性</div>
          </div>
        </div>
      </aside>
      <main id="viewport">
        <div id="loading">准备中...</div>
        <div id="empty-tip">
          <h2>尚未加载 IFC 模型</h2>
          <p>请打开 GIM 文件或选择本地 IFC 文件</p>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
