<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIM 阅读器</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      #app {
        display: flex;
        width: 100%;
        height: 100%;
      }
      #sidebar {
        width: 340px;
        flex-shrink: 0;
        background: #1e1e1e;
        color: #eee;
        display: flex;
        flex-direction: column;
        border-right: 1px solid #333;
      }
      #sidebar header {
        padding: 16px;
        border-bottom: 1px solid #333;
      }
      #sidebar h1 {
        margin: 0 0 8px;
        font-size: 18px;
        font-weight: 600;
      }
      #sidebar p {
        margin: 0;
        font-size: 12px;
        color: #aaa;
      }
      #controls {
        padding: 16px;
        border-bottom: 1px solid #333;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-radius: 6px;
        background: #0d84fc;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn:hover {
        background: #0a6fd6;
      }
      .btn:disabled {
        background: #555;
        cursor: not-allowed;
      }
      .btn-secondary {
        background: #444;
        margin-top: 8px;
      }
      .btn-secondary:hover {
        background: #555;
      }
      .btn-success {
        background: #2d8a4e;
        margin-top: 8px;
      }
      .btn-success:hover {
        background: #24753f;
      }
      .btn-small {
        padding: 6px 10px;
        font-size: 12px;
        width: auto;
      }
      .hidden-input {
        display: none;
      }
      /* IFC 选择器 */
      #ifc-picker {
        display: none;
        padding: 12px 16px;
        border-bottom: 1px solid #333;
        max-height: 260px;
        overflow-y: auto;
      }
      #ifc-picker h3 {
        margin: 0 0 8px;
        font-size: 13px;
        color: #ccc;
        font-weight: 600;
      }
      .ifc-picker-actions {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
      }
      #ifc-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .ifc-check-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        cursor: pointer;
        padding: 4px 6px;
        border-radius: 4px;
        transition: background 0.15s;
      }
      .ifc-check-item:hover {
        background: #333;
      }
      .ifc-check-item input[type="checkbox"] {
        margin: 0;
        accent-color: #0d84fc;
      }
      /* 模型列表 */
      #model-list {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
      }
      .model-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px;
        margin-bottom: 8px;
        background: #2a2a2a;
        border-radius: 6px;
        font-size: 13px;
      }
      .model-item .model-checkbox {
        margin-right: 8px;
        accent-color: #0d84fc;
        cursor: pointer;
      }
      .model-item .name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        margin-right: 8px;
      }
      .model-item .actions {
        display: flex;
        gap: 6px;
      }
      .icon-btn {
        width: 24px;
        height: 24px;
        border: none;
        border-radius: 4px;
        background: #444;
        color: #fff;
        cursor: pointer;
        font-size: 12px;
        line-height: 1;
      }
      .icon-btn:hover {
        background: #666;
      }
      #viewport {
        flex: 1;
        position: relative;
        background: #eee;
      }
      #loading {
        position: absolute;
        top: 16px;
        right: 16px;
        padding: 10px 14px;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        border-radius: 6px;
        font-size: 13px;
        display: none;
        z-index: 10;
      }
      #empty-tip {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #aaa;
        pointer-events: none;
      }
      #empty-tip h2 {
        margin: 0 0 8px;
        font-weight: 400;
      }
      #empty-tip p {
        margin: 0;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <header>
          <h1>GIM 阅读器</h1>
          <p>基于 That Open + web-ifc + JSZip</p>
        </header>
        <div id="controls">
          <button id="btn-load-gim" class="btn">打开 GIM 文件</button>
          <input id="gim-file-input" class="hidden-input" type="file" accept=".gim" />
          <button id="btn-load-local" class="btn btn-secondary">选择本地 IFC 文件</button>
          <input id="file-input" class="hidden-input" type="file" accept=".ifc" multiple />
          <button id="btn-load-demo" class="btn btn-secondary">加载 Demo 示例</button>
          <button id="btn-clear" class="btn btn-secondary">清空场景</button>
        </div>
        <div id="ifc-picker">
          <h3>GIM 中的 IFC 文件</h3>
          <div class="ifc-picker-actions">
            <button id="btn-select-all" class="btn btn-small btn-secondary">全选</button>
            <button id="btn-deselect-all" class="btn btn-small btn-secondary">取消全选</button>
            <button id="btn-load-selected" class="btn btn-small btn-success">加载选中</button>
          </div>
          <div id="ifc-list"></div>
        </div>
        <div id="model-list"></div>
      </aside>
      <main id="viewport">
        <div id="loading">准备中...</div>
        <div id="empty-tip">
          <h2>尚未加载 IFC 模型</h2>
          <p>请打开 GIM 文件或选择本地 IFC 文件</p>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
